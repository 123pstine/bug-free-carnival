<!DOCTYPE html>
<html>
<body>

<h3>Create Return Label</h3>

<input id="name" placeholder="Your Name"><br>
<input id="address" placeholder="Your Address"><br>
<input id="city" placeholder="City"><br>
<input id="state" placeholder="State"><br>
<input id="zip" placeholder="ZIP"><br>

<button onclick="createLabel()">Create Return Label</button>

<div id="result"></div>

<script>
async function createLabel() {
  const data = {
    fromName: document.getElementById("name").value,
    fromAddress: document.getElementById("address").value,
    fromCity: document.getElementById("city").value,
    fromState: document.getElementById("state").value,
    fromZip: document.getElementById("zip").value,
    weight: "1"
  };

  const res = await fetch("https://script.google.com/a/macros/nhaschools.com/s/AKfycbxbyJ12n_oSn-aaPPJvYEz9RclGBv0K6jKrnShXFObrrLopDDsFsnvGDEXrVtxx9quxJQ/exec", {
    method: "POST",
    body: JSON.stringify(data)
  });

  const json = await res.json();

 if (json.downloadUrl) {
    document.getElementById("download").innerHTML =
      `<a href="${json.downloadUrl}" target="_blank">
        Download Return Label (PDF)
      </a>`;
  } else {
    console.log(json);
  }
}
</script>

</body>
</html>
